name: Sync to Personal Fork

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Sync forked repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "ImJaeOne"
          git config user.email "${{ secrets.EMAIL }}"

      - name: Add fork remote
        run: |
          git config credential.helper store
          echo "https://ImJaeOne:${TOKEN}@github.com" > ~/.git-credentials
          git remote add fork https://github.com/ImJaeOne/sir.git
          git remote -v
        env:
          TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Push to fork
        run: |
          git push -f fork main

      - name: Clean up
        if: always()
        run: |
          git remote remove fork 2>/dev/null || true
          rm -f ~/.git-credentials
