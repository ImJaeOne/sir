name: Sync to Personal Fork

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Sync forked repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "ImJaeOne"
          git config user.email "${{ secrets.EMAIL }}"

      - name: Push to fork
        run: |
          git remote add fork https://ImJaeOne:${TOKEN}@github.com/ImJaeOne/sir.git
          git push -f fork main
        env:
          TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Clean up
        if: always()
        run: |
          git remote remove fork 2>/dev/null || true
